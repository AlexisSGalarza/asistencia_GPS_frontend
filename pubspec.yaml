name: frontend
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.6.0
  geolocator: ^14.0.2
  flutter_secure_storage: ^10.0.0
  flutter_map: ^8.2.2
  latlong2: ^0.9.1
  network_info_plus: ^7.0.0
  permission_handler: ^12.0.1
  google_fonts: ^6.2.1
  path_provider: ^2.1.3
  open_file: ^3.3.2
  flutter_dotenv: ^5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/Logo.png"

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/

  fonts:
    - family: Merriweather
      fonts:
        - asset: assets/images/fonts/Merriweather/static/Merriweather_24pt-Regular.ttf
        - asset: assets/images/fonts/Merriweather/static/Merriweather_24pt-Bold.ttf
          weight: 700
